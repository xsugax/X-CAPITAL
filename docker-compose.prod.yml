version: "3.9"

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: xcapital-postgres
    restart: always
    environment:
      POSTGRES_USER: xcapital
      POSTGRES_PASSWORD: xcapital_prod_secure_password_2026
      POSTGRES_DB: xcapital_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xcapital -d xcapital_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xcapital-net

  # ─── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xcapital-redis
    restart: always
    command: redis-server --requirepass xcapital_redis_secure_2026 --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - xcapital-net

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: xcapital-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://xcapital:xcapital_prod_secure_password_2026@postgres:5432/xcapital_db
      REDIS_URL: redis://:xcapital_redis_secure_2026@redis:6379
      JWT_SECRET: xcapital_jwt_secret_production_key_2026_minimum_64_chars_here
      FRONTEND_URL: https://xcapital.investments
      ALPACA_API_KEY: pk_test_your_alpaca_api_key_here
      ALPACA_SECRET_KEY: your_alpaca_secret_key_here
      ALPACA_BASE_URL: https://api.alpaca.markets
      ALPACA_DATA_URL: https://data.alpaca.markets
      AI_ORACLE_URL: http://ai-oracle:8000
    expose:
      - "4000"
    networks:
      - xcapital-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: xcapital-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://xcapital.investments/api/v1
      NEXT_PUBLIC_WS_URL: wss://xcapital.investments
      NEXT_PUBLIC_FINNHUB_API_KEY: d7damlhr01qggoenll90d7damlhr01qggoenll9g
      NODE_ENV: production
    expose:
      - "3000"
    networks:
      - xcapital-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── AI Oracle Service ──────────────────────────────────────────────────────
  ai-oracle:
    build: ./ai-oracle
    container_name: xcapital-oracle
    restart: always
    environment:
      PORT: 8000
      ENV: production
    expose:
      - "8000"
    networks:
      - xcapital-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: xcapital-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/ssl/certs:ro
      - ./ssl/private:/etc/ssl/private:ro
    depends_on:
      - backend
      - frontend
      - ai-oracle
    networks:
      - xcapital-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  xcapital-net:
    driver: bridge
