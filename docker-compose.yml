version: '3.9'

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: xcapital-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xcapital
      POSTGRES_PASSWORD: xcapital_secret
      POSTGRES_DB: xcapital_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xcapital -d xcapital_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xcapital-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: xcapital-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://xcapital:xcapital_secret@postgres:5432/xcapital_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_this_in_production_super_secret_key
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: xcapital-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # ─── AI Oracle Service ──────────────────────────────────────────────────────
  ai-oracle:
    build: ./ai-oracle
    container_name: xcapital-oracle
    restart: unless-stopped
    environment:
      PORT: 8000
      ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./ai-oracle:/app

volumes:
  postgres_data:
